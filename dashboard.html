<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Concursos | Painel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCi3qRVREDfcR-MBS-RaTKrcJMz5g_N1kw",
            authDomain: "dan-concursos.firebaseapp.com",
            projectId: "dan-concursos",
            storageBucket: "dan-concursos.firebasestorage.app",
            messagingSenderId: "562408055516",
            appId: "1:562408055516:web:ac6a11898690f35443ca19"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuário logado via Firebase
                document.getElementById("userName").innerText = user.displayName;
                document.getElementById("userPic").src = user.photoURL;
                document.getElementById("userProfile").style.display = "flex";
                
                if (typeof buscarQuestoes === "function") buscarQuestoes();
            } else {
                // Se não houver sessão ativa, volta pro login
                localStorage.clear();
                window.location.href = "index.html";
            }
        });

        window.deslogar = () => {
            signOut(auth).then(() => {
                localStorage.clear();
                window.location.href = "index.html";
            });
        };
    </script>

    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #fff; border-bottom: 1px solid #ddd;">
        <h1>Dan Concursos</h1>

        <div id="userProfile" style="display: none; align-items: center; gap: 12px; background: #f0f0f0; padding: 5px 15px; border-radius: 50px;">
            <img id="userPic" src="" width="35" style="border-radius: 50%;">
            <span id="userName" style="font-weight: bold;"></span>
            <button onclick="deslogar()" style="background: #e74c3c; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">
                SAIR
            </button>
        </div>
    </header>

    <main class="container">
        <section id="feedQuestoes">
            <p>Carregando questões...</p>
        </section>
    </main>

    <script src="js/api.js"></script>
</body>
</html>
