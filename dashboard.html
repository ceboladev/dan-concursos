<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Concursos | Painel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #fff; border-bottom: 1px solid #ddd;">
        <h1 style="margin: 0;">Dan Concursos</h1>

        <div id="userProfile" style="display: flex; align-items: center; gap: 12px;">
            <img id="userPic" src="" width="35" style="border-radius: 50%; border: 1px solid #ccc;">
            <span id="userName" style="font-weight: bold; color: #333;"></span>
            <button onclick="logout()" style="background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">
                SAIR
            </button>
        </div>
    </header>

    <main> 
        <aside class="filters">
    <h3>Filtros</h3>
    <label>Disciplina:</label>
    <select id="disciplina">
        <option value="todos">Todas</option>
        <option value="portugues">Português</option>
        <option value="informatica">Informática</option>
    </select>

    <label>Banca:</label>
    <input type="text" id="banca" placeholder="Ex: FGV, IBADE...">

    <button onclick="buscarQuestoes()">Filtrar Questões</button>
</aside>

<div id="placar-container">
    Acertos: <span id="contador-acertos">0</span>
    Erros: <span id="contador-erros">0</span>
    Aproveitamento: <span id="porcentagem-acerto">0%</span>
    Tempo: <span id="tempo-prova">00:00:00</span>
</div>
    </main>

    <script src="js/api.js"></script>

    <script>
        // Lógica de proteção (Roda assim que a página abre)
        (function verificarAcesso() {
            const logado = localStorage.getItem('logado');
            const nome = localStorage.getItem('usuarioNome');
            const foto = localStorage.getItem('usuarioPic');

            if (logado === 'true' && nome) {
                document.getElementById("userName").innerText = nome;
                document.getElementById("userPic").src = foto;
                
                // Inicia suas questões do api.js
                if (typeof buscarQuestoes === "function") buscarQuestoes();
            } else {
                window.location.href = "index.html";
            }
        })();

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
