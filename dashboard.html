<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Concursos | Painel</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // USE A MESMA CONFIGURAÇÃO DO SEU INDEX.HTML
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "seu-projeto.firebaseapp.com",
    projectId: "seu-projeto",
    storageBucket: "seu-projeto.appspot.com",
    appId: "1:12345:web:abcde"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // VERIFICAÇÃO DE LOGIN EM TEMPO REAL
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Usuário está logado!
      console.log("Bem-vindo, Peterson:", user.email);
    } else {
      // Usuário NÃO está logado. "Chuta" ele para o index.
      window.location.href = "index.html";
    }
  });

  // FUNÇÃO DE LOGOUT (OPCIONAL - PARA O BOTÃO SAIR)
  window.deslogar = () => {
    signOut(auth).then(() => {
      window.location.href = "index.html";
    });
  };
</script>


    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #fff; border-bottom: 1px solid #ddd;">
        <h1 style="margin: 0;">Dan Concursos</h1>

        <div id="userProfile" style="display: none; align-items: center; gap: 12px; background: #f0f0f0; padding: 5px 15px; border-radius: 50px;">
            <img id="userPic" src="" width="35" style="border-radius: 50%; border: 1px solid #ccc;">
            <span id="userName" style="font-weight: bold; color: #333;"></span>
            
            <button onclick="logout()" style="
                display: inline-block !important; 
                background-color: #ff0000 !important; 
                color: #ffffff !important; 
                padding: 8px 15px !important; 
                border: none !important; 
                border-radius: 5px !important; 
                cursor: pointer !important;
                font-weight: bold !important;
            ">
                SAIR
            </button>
        </div>

        <header>
    <h1>Dan Concursos</h1>
    <button onclick="deslogar()" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
        Sair do Sistema
    </button>
</header>
    </header>

    <main class="container">
        <aside class="filters">
            <h3>Filtros</h3>
            <label>Disciplina:</label>
            <select id="disciplina">
                <option value="todos">Todas</option>
                <option value="portugues">Português</option>
                <option value="informatica">Informática</option>
                <option value="direito">Direito Constitucional</option>
            </select>

            <label>Banca:</label>
            <input type="text" id="banca" placeholder="Ex: FGV, CESPE...">

            <button onclick="buscarQuestoes()">Filtrar Questões</button>
        </aside>

        <div id="placar-container">
            <div>✅ <span id="contador-acertos">0</span></div>
            <div>❌ <span id="contador-erros">0</span></div>
            <div>📊 <span id="porcentagem-acerto">0%</span></div>
            <button onclick="reiniciarSimulado()" class="btn-reset">🔄</button>

            <div id="cronometro-container" style="border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px;">
    ⏱️ <span id="tempo-prova" style="font-family: monospace; font-size: 1.3rem;">00:00:00</span>
</div>


        </div>
</div>

        <section class="feed-questoes" id="feedQuestoes">
            <p>Selecione os filtros para começar a estudar.</p>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>

    <script>
        // Lógica de inicialização para garantir que o botão apareça
        window.onload = function() {
            const nome = localStorage.getItem('usuarioNome');
            const foto = localStorage.getItem('usuarioPic');
            const logado = localStorage.getItem('logado');

            if (logado === 'true' && nome) {
                document.getElementById("userName").innerText = nome;
                document.getElementById("userPic").src = foto;
                document.getElementById("userProfile").style.display = "flex";
                
                // Se a função de buscar questões existir, ela roda
                if (typeof buscarQuestoes === "function") {
                    buscarQuestoes();
                }
            } else {
                window.location.href = "index.html";
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
