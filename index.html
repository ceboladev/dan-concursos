<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Concursos - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">
    <div class="login-container">
        <header>
            <h1>Dan Concursos</h1>
            <p>Sua aprovação começa aqui.</p>
        </header>

        <section class="login-box">
            <h2>Bem-vindo de volta!</h2>
            <p>Acesse sua conta para continuar seus estudos.</p>
            
            <div id="buttonDiv"></div>
        </section>

        <footer>
            <p>&copy; 2026 Dan Concursos - Desenvolvido por Peterson</p>
        </footer>

         <div class="form-cadastro">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    
    <button onclick="fazerLogin(document.getElementById('email').value, document.getElementById('senha').value)">
        Entrar
    </button>
    
    <button onclick="criarConta(document.getElementById('email').value, document.getElementById('senha').value)" 
            style="background: #555; margin-top: 10px;">
        Cadastrar Novo Usuário
    </button>
         
    </div>

   
</div>
    

    <script>
        // Função para decodificar o Token JWT do Google
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        }

        // Função que o Google chama após o login bem-sucedido
        function handleCredentialResponse(response) {
            const data = parseJwt(response.credential);
            
            // Salva os dados no navegador para usar na Dashboard
            localStorage.setItem('usuarioNome', data.given_name);
            localStorage.setItem('usuarioEmail', data.email);
            localStorage.setItem('usuarioPic', data.picture);
            localStorage.setItem('logado', 'true');

            // Redireciona para a página de questões
            window.location.href = "dashboard.html";
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "785159397160-0ceuv2echsf9n8ml96i5g22fndtifvsk.apps.googleusercontent.com", // Substitua pelo seu ID do Google Cloud
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { 
                    theme: "filled_blue", 
                    size: "large", 
                    text: "signin_with",
                    shape: "pill",
                    width: "250"
                } 
            );
        };
    </script>
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // SUAS CONFIGURAÇÕES DO CONSOLE AQUI
  const firebaseConfig = {

  apiKey: "AIzaSyCi3qRVREDfcR-MBS-RaTKrcJMz5g_N1kw",

  authDomain: "dan-concursos.firebaseapp.com",

  projectId: "dan-concursos",

  storageBucket: "dan-concursos.firebasestorage.app",

  messagingSenderId: "562408055516",

  appId: "1:562408055516:web:ac6a11898690f35443ca19",

  measurementId: "G-YWHQYZJN75"

};

  // Inicializa o Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // LÓGICA DE LOGIN
  window.fazerLogin = (email, senha) => {
    signInWithEmailAndPassword(auth, email, senha)
      .then((userCredential) => {
        console.log("Logado com sucesso!");
        window.location.href = "dashboard.html"; // Redireciona
      })
      .catch((error) => {
        alert("Erro ao entrar: " + error.message);
      });
  };

  // LÓGICA DE CADASTRO (Se quiser criar novos usuários)
  window.criarConta = (email, senha) => {
    createUserWithEmailAndPassword(auth, email, senha)
      .then(() => alert("Conta criada! Agora faça login."))
      .catch((error) => alert("Erro ao cadastrar: " + error.message));
  };
</script>
</body>
</html>
