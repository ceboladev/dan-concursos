<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Concursos - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">
    <div class="login-container">
        <header>
            <h1>Dan Concursos</h1>
            <p>Sua aprovação começa aqui.</p>
        </header>

        <section class="login-box">
            <h2>Bem-vindo de volta!</h2>
            <div id="buttonDiv" style="display: flex; justify-content: center; margin-top: 20px;"></div>
        </section>

        <footer>
            <p>&copy; 2026 Dan Concursos - Desenvolvido por Peterson</p>
        </footer>
    </div>

    <script>
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        }

        function handleCredentialResponse(response) {
            const data = parseJwt(response.credential);
            
            // Salvando exatamente como sua Dashboard espera
            localStorage.setItem('usuarioNome', data.given_name);
            localStorage.setItem('usuarioEmail', data.email);
            localStorage.setItem('usuarioPic', data.picture);
            localStorage.setItem('logado', 'true');

            window.location.href = "dashboard.html";
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "785159397160-0ceuv2echsf9n8ml96i5g22fndtifvsk.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "filled_blue", size: "large", shape: "pill", width: "250" } 
            );
        };
    </script>
</body>
</html>
