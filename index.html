<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Concursos - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">
    <div class="login-container">
        <header>
            <h1>Dan Concursos</h1>
            <p>Sua aprovação começa aqui.</p>
        </header>

        <section class="login-box">
            <h2>Bem-vindo!</h2>
            <p>Use sua conta Google para acessar o simulado.</p>
            
            <div id="buttonDiv" style="display: flex; justify-content: center; margin-top: 20px;"></div>
        </section>

        <footer>
            <p>&copy; 2026 Dan Concursos - Desenvolvido por Peterson</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCi3qRVREDfcR-MBS-RaTKrcJMz5g_N1kw",
            authDomain: "dan-concursos.firebaseapp.com",
            projectId: "dan-concursos",
            storageBucket: "dan-concursos.firebasestorage.app",
            messagingSenderId: "562408055516",
            appId: "1:562408055516:web:ac6a11898690f35443ca19"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Função global para o Google chamar
        window.handleCredentialResponse = (response) => {
            const credential = GoogleAuthProvider.credential(response.credential);
            
            signInWithCredential(auth, credential)
                .then((result) => {
                    // Salva no LocalStorage para garantir que o Dashboard leia rápido
                    localStorage.setItem('logado', 'true');
                    localStorage.setItem('usuarioNome', result.user.displayName);
                    localStorage.setItem('usuarioPic', result.user.photoURL);
                    
                    window.location.href = "dashboard.html";
                })
                .catch((error) => alert("Erro no Firebase: " + error.message));
        };

        // Inicializa o botão do Google
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "785159397160-0ceuv2echsf9n8ml96i5g22fndtifvsk.apps.googleusercontent.com",
                callback: window.handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "filled_blue", size: "large", shape: "pill", width: "250" }
            );
        };
    </script>
</body>
</html>
