<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan Concursos | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --text: #1e293b;
            --bg: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            /* Gradiente sutil para profundidade */
            background: radial-gradient(circle at top right, #e2e8f0 0%, #f8fafc 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .logo-area h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-area p {
            color: #64748b;
            font-size: 0.95rem;
            margin: 8px 0 32px 0;
        }

        .instruction {
            margin-bottom: 24px;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
        }

        #buttonDiv {
            display: flex;
            justify-content: center;
            min-height: 44px; /* Evita que o layout pule ao carregar */
        }

        footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #f1f5f9;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* Animação suave de entrada */
        .login-card {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <h1>Dan Concursos</h1>
            <p>Plataforma de Simulados GCM</p>
        </div>

        <div class="instruction">Acesse sua conta para continuar</div>
        
        <div id="buttonDiv"></div>

        <footer>
            Desenvolvido por Peterson &copy; 2026<br>
            Foco na Aprovação
        </footer>
    </div>

    <script>
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        }

        function handleCredentialResponse(response) {
            const data = parseJwt(response.credential);
            localStorage.setItem('usuarioNome', data.given_name);
            localStorage.setItem('usuarioPic', data.picture);
            localStorage.setItem('logado', 'true');
            window.location.href = "dashboard.html";
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "785159397160-0ceuv2echsf9n8ml96i5g22fndtifvsk.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { 
                    theme: "outline", // Mais profissional que o "filled"
                    size: "large", 
                    shape: "rectangular", // Combina com o card
                    width: "280",
                    text: "signin_with"
                } 
            );
        };
    </script>
</body>
</html>
